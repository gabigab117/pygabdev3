{% if page_obj.paginator.num_pages > 1 %}
<nav class="pager" aria-label="Pagination">
  {% if page_obj.has_previous %}
  <a href="?page=1" aria-label="Première page">«</a>
  <a href="?page={{ page_obj.previous_page_number }}" aria-label="Précédente">‹</a>
  {% endif %}
  <span class="cur">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
  <a href="?page={{ page_obj.next_page_number }}" aria-label="Suivante">›</a>
  <a href="?page={{ page_obj.paginator.num_pages }}" aria-label="Dernière page">»</a>
  {% endif %}
</nav>
{% endif %}
